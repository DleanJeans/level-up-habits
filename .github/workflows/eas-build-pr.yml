name: EAS Android Preview Build for PRs

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ota-update:
    name: Send OTA Update
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      npm_config_user_agent: pnpm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Send OTA Update
        run: |
          eas update --branch preview --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

  local-build:
    name: Build APK Locally
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      npm_config_user_agent: pnpm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK locally
        run: eas build --platform android --profile preview --local --non-interactive --output ./build-output.apk

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        id: upload-artifact
        with:
          name: android-preview-apk
          path: ./build-output.apk
          retention-days: 30
          compression-level: 0

      - name: Comment PR with artifact URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const comment = `### 📦 Android APK Build Complete

            The preview APK has been built successfully!

            **[Download APK from Artifacts](${artifactUrl})**

            The artifact will be available for 30 days.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
